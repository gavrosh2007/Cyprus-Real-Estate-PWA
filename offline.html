<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Недвижимость Кипр - Нет соединения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: url('https://images.pexels.com/photos/101808/pexels-photo-101808.jpeg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }
        /* Оверлей как в оригинале */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }
        .offline-container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 500px;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 3rem 2rem;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .offline-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        h1 {
            font-size: 2.5em;
            color: #e8491d;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.7), 
                         4px 4px 0px rgba(0, 0, 0, 0.5);
            margin-bottom: 1rem;
        }
        p {
            color: #ffffff;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .retry-btn {
            background: #e8491d;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .retry-btn:hover {
            background: #ff6633;
            transform: scale(1.02);
        }
        .contacts {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #e8491d;
        }
        .contacts a {
            color: #d3d3d3;
            text-decoration: none;
            display: inline-block;
            margin: 0.5rem;
            font-size: 0.9rem;
        }
        .contacts a:hover {
            text-decoration: underline;
            color: #e8491d;
        }
        .check-status {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: #d3d3d3;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>Нет соединения</h1>
        <p>Проверьте подключение к интернету.<br>Как только связь восстановится, приложение продолжит работу.</p>
        <button class="retry-btn" onclick="location.reload()">⟳ Попробовать снова</button>
        
        <div class="contacts">
            <a href="https://t.me/faufautua" target="_blank">📱 Telegram</a>
            <a href="mailto:gavrosh2007@gmail.com">✉️ Email</a>
            <a href="tel:+35799453575">📞 +357 99 453575</a>
        </div>
        <div class="check-status" id="statusCheck">⏳ Проверка соединения...</div>
    </div>

    <script>
        const statusDiv = document.getElementById('statusCheck');
        let checkCount = 0;
        
        const interval = setInterval(() => {
            checkCount++;
            if (navigator.onLine) {
                statusDiv.innerHTML = '✅ Соединение восстановлено! Перезагрузка...';
                clearInterval(interval);
                setTimeout(() => location.reload(), 500);
            } else {
                statusDiv.innerHTML = `⏳ Нет соединения... попытка ${checkCount}`;
            }
        }, 3000);
    </script>
</body>
</html>

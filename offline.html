<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нет соединения</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: rgba(0,0,0,0.8);
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid #e8491d;
        }
        button {
            background: #e8491d;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            color: white;
            margin-top: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📡 Нет соединения</h1>
        <p>Проверьте интернет</p>
        <button onclick="location.reload()">⟳ Повторить</button>
    </div>
    <script>
        setInterval(() => { if (navigator.onLine) location.reload(); }, 5000);
    </script>
</body>
</html>
